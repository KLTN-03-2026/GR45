# GR45 — bố cục giống Docker private (frontend + web + db, mount cả repo cha).
# Chạy từ thư mục GR45/:
#   docker compose build
#   docker compose up -d
#
# FE: http://localhost:15173  |  API: http://localhost:18080/api/v1/...
# MySQL host: 127.0.0.1:34007  |  volume: datn_mysql_data (cùng tên volume private)
#
# Mail SMTP: cấu hình trực tiếp trong service web bên dưới.
#
# Container: gr45-* (tránh trùng tên với stack private datn-* đang chạy song song).

name: gr45

services:
  frontend:
    image: node:20-alpine
    container_name: gr45-frontend
    working_dir: /workspace/GR45/FE
    volumes:
      - ../:/workspace
    ports:
      - "15173:5173"
    environment:
      # GR45/FE axiosClient tự thêm /api/ — không thêm /api/ ở đây (tránh /api/api/)
      VITE_API_BASE_URL: http://localhost:18080
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - web

  web:
    build:
      context: ..
      dockerfile: GR45/docker/web.Dockerfile
    container_name: gr45-web
    working_dir: /workspace/GR45/BE
    volumes:
      - ../:/workspace
    ports:
      - "18080:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY:-}
      APP_URL: http://localhost:18080
      FRONTEND_URL: http://localhost:15173
      LOG_LEVEL: debug
      LOG_CHANNEL: stack
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: gobus_db
      DB_USERNAME: gobus_user
      DB_PASSWORD: gobus_pass
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      MAIL_MAILER: smtp
      MAIL_SCHEME: ""
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: "587"
      MAIL_USERNAME: thanhtruc5699@gmail.com
      MAIL_PASSWORD: "dqap vhle qxph bctx"
      MAIL_FROM_ADDRESS: thanhtruc5699@gmail.com
      MAIL_FROM_NAME: "Thanh Truc"
      MAIL_LOG_CHANNEL: stack
    depends_on:
      - db
    command: sh /workspace/GR45/docker/start-backend.sh

  db:
    image: mysql:8.0
    container_name: gr45-db
    ports:
      - "34007:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_secret_123
      MYSQL_DATABASE: gobus_db
      MYSQL_USER: gobus_user
      MYSQL_PASSWORD: gobus_pass
    volumes:
      - datn_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  datn_mysql_data:
    name: datn_mysql_data
